name: Comfort Index Daily Pilot Day

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: comfort-index-daily-pilot-day
  cancel-in-progress: false

jobs:
  build-pilot-day:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      pages_available: ${{ steps.pages_status.outputs.pages_available }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Detect GitHub Pages availability
        id: pages_status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "pages_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages_available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository. Archive artifacts will still be uploaded."
          fi

      - name: Configure GitHub Pages
        if: steps.pages_status.outputs.pages_available == 'true'
        uses: actions/configure-pages@v5

      - name: Verify required local rendering asset
        run: |
          test -f comfortwx/mapping/data/us_states.geojson

      - name: Run daily archived pilot-day build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m comfortwx.main \
            --pilot-day-archive \
            --source openmeteo \
            --publish-preset standard \
            --presentation-theme shareable \
            --pilot-cache-mode reuse

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-archive
          path: output/archive/
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare GitHub Pages preview artifact
        if: always()
        run: |
          mkdir -p site
          if [ -d output/archive ]; then
            cp -r output/archive/. site/
          else
            printf '%s\n' \
              '<html>' \
              '  <head><meta charset="utf-8"><title>Comfort Index Archive</title></head>' \
              '  <body>' \
              '    <h1>Comfort Index Archive</h1>' \
              '    <p>The latest scheduled build did not produce an archive directory. Check the GitHub Actions run logs and artifacts for details.</p>' \
              '  </body>' \
              '</html>' > site/index.html
          fi

      - name: Upload Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-pages-preview
          path: site/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always() && steps.pages_status.outputs.pages_available == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy-pages:
    if: github.ref == 'refs/heads/main' && needs.build-pilot-day.result == 'success' && needs.build-pilot-day.outputs.pages_available == 'true'
    needs: build-pilot-day
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
