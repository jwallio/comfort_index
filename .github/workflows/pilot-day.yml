name: Daily Pilot Day

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-pilot-day
  cancel-in-progress: false

jobs:
  build-pilot-day:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify required local rendering asset
        run: |
          test -f nicewx/mapping/data/us_states.geojson

      - name: Run daily archived pilot-day build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m nicewx.main \
            --pilot-day-archive \
            --source openmeteo \
            --publish-preset standard \
            --presentation-theme shareable \
            --pilot-cache-mode reuse

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nicewx-archive
          path: output/archive/
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare GitHub Pages preview artifact
        if: always()
        run: |
          mkdir -p site
          if [ -d output/archive ]; then
            cp -r output/archive/. site/
          else
            cat > site/index.html <<'EOF'
            <html>
              <head><meta charset="utf-8"><title>Comfort Index Archive</title></head>
              <body>
                <h1>Comfort Index Archive</h1>
                <p>The latest scheduled build did not produce an archive directory. Check the GitHub Actions run logs and artifacts for details.</p>
              </body>
            </html>
            EOF
          fi

      - name: Upload Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nicewx-pages-preview
          path: site/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-pilot-day
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
