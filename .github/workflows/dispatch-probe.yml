name: Pages Deploy Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build placeholder site
        run: |
          mkdir -p site
          printf '%s\n' \
            '<html>' \
            '  <head><meta charset="utf-8"><title>Pages Deploy Probe</title></head>' \
            '  <body><h1>Pages Deploy Probe</h1><p>Dispatch and deploy path is working.</p></body>' \
            '</html>' > site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
