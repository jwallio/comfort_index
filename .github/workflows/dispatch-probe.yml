name: Pages Deploy Probe

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build archive
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          export COMFORTWX_RUN_TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export COMFORTWX_VALID_DATE="$(python - <<'PY'
from datetime import datetime
from zoneinfo import ZoneInfo
print(datetime.now(ZoneInfo("America/New_York")).date().isoformat())
PY
)"
          python -m comfortwx.main \
            --pilot-day-archive \
            --source openmeteo \
            --publish-preset standard \
            --presentation-theme shareable \
            --pilot-cache-mode reuse \
            --pilot-span-days 1 \
            --date "$COMFORTWX_VALID_DATE"

      - name: Merge verification site into Pages content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site
          cp -r output/archive/. site/

          artifact_id="$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" --jq '.artifacts | map(select(.name=="comfortwx-verification-benchmark" and .expired==false)) | sort_by(.created_at) | reverse | .[0].id // ""' 2>/dev/null || true)"
          if [ -n "$artifact_id" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > verification_artifact.zip
            python - <<'PY'
from pathlib import Path
from zipfile import ZipFile

zip_path = Path("verification_artifact.zip")
target = Path("verification_artifact")
if zip_path.exists():
    with ZipFile(zip_path) as zf:
        zf.extractall(target)
PY
            if [ -f verification_artifact/output/verification_site/latest/index.html ]; then
              mkdir -p site/verification
              cp -r verification_artifact/output/verification_site/latest/. site/verification/
              python - <<'PY'
from pathlib import Path

index_path = Path("site/index.html")
if index_path.exists():
    html_text = index_path.read_text(encoding="utf-8")
    marker = "<p class='subtitle'>Browse the latest stitched CONUS maps first, then open any archived run for the full image gallery.</p>"
    addition = (
        marker
        + "<div class='meta'><span><a href='verification/index.html' style='text-decoration:none;color:inherit;'>Verification dashboard</a></span></div>"
        + "<p class='archive-note'>Latest benchmark stats, verification charts, and case error maps are available in the verification dashboard.</p>"
    )
    if marker in html_text and "verification/index.html" not in html_text:
        html_text = html_text.replace(marker, addition, 1)
        index_path.write_text(html_text, encoding="utf-8")
PY
            fi
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
