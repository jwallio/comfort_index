name: Comfort Index Daily Pilot Day

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Product workflow to run
        required: true
        default: pilot-day-archive
        type: choice
        options:
          - pilot-day-archive
          - pilot-day
      forecast_days:
        description: Consecutive valid dates to build
        required: true
        default: "7"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "7"
      start_date:
        description: Optional start valid date in YYYY-MM-DD format. Leave blank for today.
        required: false
        default: ""
  schedule:
    - cron: "20 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: comfort-index-daily-pilot-day
  cancel-in-progress: false

jobs:
  build-pilot-day:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      pages_available: ${{ steps.pages_status.outputs.pages_available }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Detect GitHub Pages availability
        id: pages_status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "pages_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages_available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository. Archive artifacts will still be uploaded."
          fi

      - name: Configure GitHub Pages
        if: steps.pages_status.outputs.pages_available == 'true'
        uses: actions/configure-pages@v5

      - name: Verify required local rendering asset
        run: |
          test -f comfortwx/mapping/data/us_states.geojson

      - name: Run daily archived pilot-day build
        env:
          PYTHONUNBUFFERED: "1"
          WORKFLOW_RUN_MODE: ${{ github.event.inputs.run_mode }}
          WORKFLOW_FORECAST_DAYS: ${{ github.event.inputs.forecast_days }}
          WORKFLOW_START_DATE: ${{ github.event.inputs.start_date }}
        run: |
          run_mode="${WORKFLOW_RUN_MODE:-pilot-day-archive}"
          forecast_days="${WORKFLOW_FORECAST_DAYS:-7}"
          start_date="${WORKFLOW_START_DATE:-}"
          export COMFORTWX_RUN_TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cmd=(
            python -m comfortwx.main
            --source openmeteo
            --publish-preset standard
            --presentation-theme shareable
            --pilot-cache-mode reuse
            --pilot-span-days "$forecast_days"
          )

          if [ "$run_mode" = "pilot-day" ]; then
            cmd+=(--pilot-day)
          else
            cmd+=(--pilot-day-archive)
          fi

          if [ -n "$start_date" ]; then
            cmd+=(--date "$start_date")
          fi

          "${cmd[@]}"

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-archive
          path: output/archive/
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare GitHub Pages preview artifact
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site
          if [ -d output/archive ]; then
            cp -r output/archive/. site/
          else
            printf '%s\n' \
              '<html>' \
              '  <head><meta charset="utf-8"><title>Comfort Index Archive</title></head>' \
              '  <body>' \
              '    <h1>Comfort Index Archive</h1>' \
              '    <p>The latest scheduled build did not produce an archive directory. Check the GitHub Actions run logs and artifacts for details.</p>' \
              '  </body>' \
              '</html>' > site/index.html
          fi

          mkdir -p verification_artifact
          artifact_id="$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" --jq '.artifacts | map(select(.name=="comfortwx-verification-benchmark" and .expired==false)) | sort_by(.created_at) | reverse | .[0].id // ""' 2>/dev/null || true)"
          if [ -n "$artifact_id" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > verification_artifact.zip
            python - <<'PY'
from pathlib import Path
from zipfile import ZipFile

zip_path = Path("verification_artifact.zip")
target = Path("verification_artifact")
if zip_path.exists():
    with ZipFile(zip_path) as zf:
        zf.extractall(target)
PY
            if [ -f verification_artifact/output/verification_site/latest/index.html ]; then
              mkdir -p site/verification
              cp -r verification_artifact/output/verification_site/latest/. site/verification/
              python - <<'PY'
from pathlib import Path

index_path = Path("site/index.html")
if index_path.exists():
    html_text = index_path.read_text(encoding="utf-8")
    marker = "<p class='subtitle'>Browse the latest stitched CONUS maps first, then open any archived run for the full image gallery.</p>"
    addition = (
        marker
        + "<div class='meta'><span><a href='verification/index.html' style='text-decoration:none;color:inherit;'>Verification dashboard</a></span></div>"
        + "<p class='archive-note'>Latest benchmark stats, verification charts, and case error maps are available in the verification dashboard.</p>"
    )
    if marker in html_text and "verification/index.html" not in html_text:
        html_text = html_text.replace(marker, addition, 1)
        index_path.write_text(html_text, encoding="utf-8")
PY
            fi
          fi

      - name: Upload Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-pages-preview
          path: site/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always() && steps.pages_status.outputs.pages_available == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy-pages:
    if: github.ref == 'refs/heads/main' && needs.build-pilot-day.result == 'success' && needs.build-pilot-day.outputs.pages_available == 'true'
    needs: build-pilot-day
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
