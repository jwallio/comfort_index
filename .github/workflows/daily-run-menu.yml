name: Comfort Index Daily Schedule

on:
  schedule:
    - cron: "20 12 * * *"

permissions:
  contents: write

concurrency:
  group: comfort-index-daily-schedule
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Verify required local rendering asset
        run: |
          test -f comfortwx/mapping/data/us_states.geojson

      - name: Run scheduled archived build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          export COMFORTWX_RUN_TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python -m comfortwx.main \
            --pilot-day-archive \
            --source openmeteo \
            --publish-preset standard \
            --presentation-theme shareable \
            --pilot-cache-mode reuse \
            --pilot-span-days 7

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-archive
          path: output/archive/
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare public site bundle
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site
          if [ -d output/archive ]; then
            cp -r output/archive/. site/
          else
            printf '%s\n' \
              '<html>' \
              '  <head><meta charset="utf-8"><title>Comfort Index Archive</title></head>' \
              '  <body>' \
              '    <h1>Comfort Index Archive</h1>' \
              '    <p>The latest run did not produce an archive directory. Check the workflow logs and artifacts for details.</p>' \
              '  </body>' \
              '</html>' > site/index.html
          fi

          mkdir -p verification_artifact
          artifact_id="$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" --jq '.artifacts | map(select(.name=="comfortwx-verification-benchmark" and .expired==false)) | sort_by(.created_at) | reverse | .[0].id // ""' 2>/dev/null || true)"
          if [ -n "$artifact_id" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > verification_artifact.zip
            python - <<'PY'
from pathlib import Path
from zipfile import ZipFile

zip_path = Path("verification_artifact.zip")
target = Path("verification_artifact")
if zip_path.exists():
    with ZipFile(zip_path) as zf:
        zf.extractall(target)
PY
            if [ -f verification_artifact/output/verification_site/latest/index.html ]; then
              mkdir -p site/verification
              cp -r verification_artifact/output/verification_site/latest/. site/verification/
            fi
          fi

      - name: Upload Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-pages-preview
          path: site/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish site to gh-pages branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf site_publish
          mkdir -p site_publish
          cp -r site/. site_publish/
          touch site_publish/.nojekyll

          cd site_publish
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Comfort Index site" || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
