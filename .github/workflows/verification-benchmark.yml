name: Comfort Index Verification Benchmark

on:
  workflow_dispatch:
    inputs:
      benchmark_tier:
        description: Benchmark tier to run
        required: true
        default: default
        type: choice
        options:
          - default
          - focused-mae
          - full-seasonal
      benchmark_date:
        description: Optional YYYY-MM-DD override for all benchmark regions. Leave blank for the default multi-date case set.
        required: false
        default: ""
      mesh_profile:
        description: Regional mesh profile for verification runs
        required: true
        default: standard
        type: choice
        options:
          - standard
          - fine
      lead_days:
        description: Comma-separated forecast leads to verify
        required: false
        default: "1,2,3,7"
      analysis_model:
        description: Verification truth source
        required: true
        default: noaa_urma_rtma
        type: choice
        options:
          - noaa_urma_rtma
          - best_match
      forecast_model:
        description: Forecast model to verify against the truth source
        required: true
        default: gfs_seamless
        type: choice
        options:
          - gfs_seamless
          - ncep_hrrr_conus
      aggregation_policies:
        description: Comma-separated verification aggregation policies to compare
        required: false
        default: "baseline"
      case_cache_mode:
        description: Reuse existing verification artifacts when available
        required: true
        default: reuse
        type: choice
        options:
          - reuse
          - refresh
      max_fresh_cases:
        description: Optional cap on uncached cases fetched in this run. Leave blank for tier default.
        required: false
        default: ""
      case_cooldown_seconds:
        description: Seconds to wait between uncached cases
        required: false
        default: "4.0"
      regions:
        description: Optional comma-separated region filter for chunked runs
        required: false
        default: ""
      dates:
        description: Optional comma-separated YYYY-MM-DD filter for chunked runs
        required: false
        default: ""
  schedule:
    - cron: "35 13 * * 1"

permissions:
  contents: read

concurrency:
  group: comfort-index-verification-benchmark
  cancel-in-progress: false

jobs:
  verify-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore Open-Meteo HTTP cache
        id: restore-http-cache
        uses: actions/cache/restore@v4
        with:
          path: output/openmeteo_http_cache
          key: comfortwx-openmeteo-http-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            comfortwx-openmeteo-http-${{ runner.os }}-${{ github.ref_name }}-

      - name: Restore verification hourly cache
        id: restore-hourly-cache
        uses: actions/cache/restore@v4
        with:
          path: output/verification_hourly_cache
          key: comfortwx-verification-hourly-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            comfortwx-verification-hourly-${{ runner.os }}-${{ github.ref_name }}-

      - name: Restore NOAA analysis cache
        id: restore-noaa-cache
        uses: actions/cache/restore@v4
        with:
          path: output/noaa_analysis_cache
          key: comfortwx-noaa-analysis-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            comfortwx-noaa-analysis-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libpython3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cartopy

      - name: Verify required local rendering asset
        run: |
          test -f comfortwx/mapping/data/us_states.geojson

      - name: Run verification benchmark
        env:
          PYTHONUNBUFFERED: "1"
          WORKFLOW_BENCHMARK_TIER: ${{ github.event.inputs.benchmark_tier }}
          WORKFLOW_BENCHMARK_DATE: ${{ github.event.inputs.benchmark_date }}
          WORKFLOW_MESH_PROFILE: ${{ github.event.inputs.mesh_profile }}
          WORKFLOW_LEAD_DAYS: ${{ github.event.inputs.lead_days }}
          WORKFLOW_ANALYSIS_MODEL: ${{ github.event.inputs.analysis_model }}
          WORKFLOW_FORECAST_MODEL: ${{ github.event.inputs.forecast_model }}
          WORKFLOW_AGGREGATION_POLICIES: ${{ github.event.inputs.aggregation_policies }}
          WORKFLOW_CASE_CACHE_MODE: ${{ github.event.inputs.case_cache_mode }}
          WORKFLOW_MAX_FRESH_CASES: ${{ github.event.inputs.max_fresh_cases }}
          WORKFLOW_CASE_COOLDOWN_SECONDS: ${{ github.event.inputs.case_cooldown_seconds }}
          WORKFLOW_REGIONS: ${{ github.event.inputs.regions }}
          WORKFLOW_DATES: ${{ github.event.inputs.dates }}
        run: |
          benchmark_tier="${WORKFLOW_BENCHMARK_TIER:-default}"
          benchmark_date="${WORKFLOW_BENCHMARK_DATE:-}"
          mesh_profile="${WORKFLOW_MESH_PROFILE:-standard}"
          lead_days="${WORKFLOW_LEAD_DAYS:-1,2,3,7}"
          analysis_model="${WORKFLOW_ANALYSIS_MODEL:-noaa_urma_rtma}"
          forecast_model="${WORKFLOW_FORECAST_MODEL:-gfs_seamless}"
          aggregation_policies="${WORKFLOW_AGGREGATION_POLICIES:-baseline}"
          case_cache_mode="${WORKFLOW_CASE_CACHE_MODE:-reuse}"
          max_fresh_cases="${WORKFLOW_MAX_FRESH_CASES:-}"
          case_cooldown_seconds="${WORKFLOW_CASE_COOLDOWN_SECONDS:-4.0}"
          regions="${WORKFLOW_REGIONS:-}"
          dates="${WORKFLOW_DATES:-}"
          export COMFORTWX_RUN_TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cmd=(
            python -m comfortwx.validation.verify_benchmark
            --benchmark-tier "$benchmark_tier"
            --mesh-profile "$mesh_profile"
            --lead-days "$lead_days"
            --forecast-model "$forecast_model"
            --analysis-model "$analysis_model"
            --aggregation-policies "$aggregation_policies"
            --case-cache-mode "$case_cache_mode"
            --case-cooldown-seconds "$case_cooldown_seconds"
          )

          if [ -n "$benchmark_date" ]; then
            cmd+=(--date "$benchmark_date")
          fi
          if [ -n "$max_fresh_cases" ]; then
            cmd+=(--max-fresh-cases "$max_fresh_cases")
          fi
          if [ -n "$regions" ]; then
            cmd+=(--regions "$regions")
          fi
          if [ -n "$dates" ]; then
            cmd+=(--dates "$dates")
          fi

          "${cmd[@]}"

      - name: Upload verification benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-verification-benchmark
          path: |
            output/comfortwx_verify_*
            output/verification_site/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload verification Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-verification-pages-preview
          path: output/verification_site/latest/
          if-no-files-found: warn
          retention-days: 14

      - name: Save Open-Meteo HTTP cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/openmeteo_http_cache
          key: ${{ steps.restore-http-cache.outputs.cache-primary-key }}

      - name: Save verification hourly cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/verification_hourly_cache
          key: ${{ steps.restore-hourly-cache.outputs.cache-primary-key }}

      - name: Save NOAA analysis cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/noaa_analysis_cache
          key: ${{ steps.restore-noaa-cache.outputs.cache-primary-key }}
