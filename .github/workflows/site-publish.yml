name: Comfort Index Site Publish

on:
  workflow_dispatch:
    inputs:
      publish_reason:
        description: Optional note for the site publish run
        required: false
        default: manual
        type: string
  schedule:
    - cron: "35 0 * * *"
    - cron: "35 6 * * *"
    - cron: "35 12 * * *"
    - cron: "35 18 * * *"

permissions:
  contents: write

concurrency:
  group: comfort-index-site-publish
  cancel-in-progress: false

jobs:
  publish-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate publisher trigger
        env:
          WORKFLOW_PUBLISH_REASON: ${{ github.event.inputs.publish_reason }}
        run: |
          publish_reason="${WORKFLOW_PUBLISH_REASON:-scheduled}"
          echo "Site publish workflow invoked: ${publish_reason}"
