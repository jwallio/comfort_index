name: Comfort Index Site Publish

on:
  workflow_dispatch:
    inputs:
      publish_reason:
        description: Optional note for the site publish run
        required: false
        default: manual
        type: string
  schedule:
    - cron: "35 0 * * *"
    - cron: "35 6 * * *"
    - cron: "35 12 * * *"
    - cron: "35 18 * * *"

permissions:
  contents: write

concurrency:
  group: comfort-index-site-publish
  cancel-in-progress: false

jobs:
  publish-site:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare site from latest artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_ARTIFACT_NAME: comfortwx-archive
          VERIFICATION_ARTIFACT_NAME: comfortwx-verification-benchmark
        run: |
          python scripts/publish_site_from_artifacts.py

      - name: Upload Pages preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comfortwx-pages-preview
          path: site/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish site to gh-pages branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf site_publish
          mkdir -p site_publish
          cp -r site/. site_publish/
          touch site_publish/.nojekyll

          cd site_publish
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Comfort Index site" || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
